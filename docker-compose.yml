# ============================================================
# BangNiCMS 官方站 — Docker Compose（生产/staging 通用）
# ------------------------------------------------------------
# 架构：
#   只有一个 caddy 服务，serve 静态文件 + 自动 HTTPS
#   dist/ 由 GitHub Actions 推到服务器 /opt/bangnicms-website/dist/
#
# 使用：
#   1. 复制 .env.example → .env，填 DOMAIN 和 ADMIN_EMAIL
#   2. docker compose up -d
#   3. caddy 会自动从 Let's Encrypt 申请证书
# ============================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: bangnicms-website-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-cms.bonnei.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?请在 .env 填 ADMIN_EMAIL（用于 Let's Encrypt 续期通知）}
    volumes:
      # 静态站构建产物（由 GitHub Actions 推送）
      - ./dist:/srv/dist:ro
      # Caddy 配置文件
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # 持久化证书与日志
      - ./caddy-data:/data
      - ./caddy-config:/config
      - ./caddy-logs:/var/log/caddy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
